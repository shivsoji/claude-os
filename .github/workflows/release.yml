name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-x86:
    name: Build x86_64 Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main
        continue-on-error: true

      - name: Build x86_64 VM
        run: |
          nix build .#packages.x86_64-linux.vm -L
          # Archive the nix store path directly (avoids symlink/special file issues)
          VM_PATH=$(nix build .#packages.x86_64-linux.vm --print-out-paths --no-link)
          tar czf claude-os-vm-x86_64.tar.gz -C "$(dirname "$VM_PATH")" "$(basename "$VM_PATH")" \
            --dereference --hard-dereference 2>/dev/null || \
          tar czf claude-os-vm-x86_64.tar.gz -C "$VM_PATH" bin/

      - name: Build x86_64 ISO
        run: |
          nix build .#packages.x86_64-linux.iso -L
          ISO_PATH=$(find "$(nix build .#packages.x86_64-linux.iso --print-out-paths --no-link)" -name '*.iso' | head -1)
          cp "$ISO_PATH" claude-os-x86_64.iso

      - name: Upload x86_64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-x86_64
          path: |
            claude-os-vm-x86_64.tar.gz
            claude-os-x86_64.iso
          retention-days: 1

  build-arm:
    name: Build aarch64 Artifacts
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main
        continue-on-error: true

      - name: Build aarch64 VM
        run: |
          nix build .#packages.aarch64-linux.vm -L
          VM_PATH=$(nix build .#packages.aarch64-linux.vm --print-out-paths --no-link)
          tar czf claude-os-vm-aarch64.tar.gz -C "$(dirname "$VM_PATH")" "$(basename "$VM_PATH")" \
            --dereference --hard-dereference 2>/dev/null || \
          tar czf claude-os-vm-aarch64.tar.gz -C "$VM_PATH" bin/

      - name: Build aarch64 ISO
        run: |
          nix build .#packages.aarch64-linux.iso -L
          ISO_PATH=$(find "$(nix build .#packages.aarch64-linux.iso --print-out-paths --no-link)" -name '*.iso' | head -1)
          cp "$ISO_PATH" claude-os-aarch64.iso

      - name: Upload aarch64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-aarch64
          path: |
            claude-os-vm-aarch64.tar.gz
            claude-os-aarch64.iso
          retention-days: 1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-x86, build-arm]
    steps:
      - uses: actions/checkout@v4

      - name: Download x86_64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-x86_64
          path: artifacts/

      - name: Download aarch64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-aarch64
          path: artifacts/

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Claude-OS ${{ github.ref_name }}

            AI-native operating system built on NixOS. Claude is your shell.

            ### Downloads

            | File | Description |
            |------|-------------|
            | `claude-os-vm-x86_64.tar.gz` | QEMU VM image (Intel/AMD) |
            | `claude-os-vm-aarch64.tar.gz` | QEMU VM image (ARM64, Apple Silicon via OrbStack) |
            | `claude-os-x86_64.iso` | Bootable ISO installer (Intel/AMD) |
            | `claude-os-aarch64.iso` | Bootable ISO installer (ARM64) |

            ### Quick Start

            **VM:**
            ```bash
            tar xzf claude-os-vm-x86_64.tar.gz
            ./bin/run-claude-os-vm
            # SSH: ssh -p 2222 claude@localhost (password: claude-os)
            ```

            **ISO:**
            ```bash
            sudo dd if=claude-os-x86_64.iso of=/dev/sdX bs=4M status=progress
            ```

            See [README](https://github.com/shivsoji/claude-os#readme) for full docs.
          files: |
            artifacts/*
