name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-vms:
    name: Build VM (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            target: packages.x86_64-linux.vm
          - arch: aarch64
            runner: ubuntu-24.04-arm
            target: packages.aarch64-linux.vm
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main
        continue-on-error: true

      - name: Build ${{ matrix.arch }} VM
        run: |
          nix build .#${{ matrix.target }} -L
          VM_PATH=$(nix build .#${{ matrix.target }} --print-out-paths --no-link)
          echo "VM_PATH=$VM_PATH" >> $GITHUB_ENV

      - name: Export nix closure
        run: |
          # Export the full nix closure so the VM is self-contained
          nix copy --to file:///tmp/claude-os-export .#${{ matrix.target }}

          # Create an install script
          cat > /tmp/claude-os-export/install.sh << 'INSTALL'
          #!/usr/bin/env bash
          set -e
          echo "Installing Claude-OS VM into your nix store..."

          if ! command -v nix >/dev/null 2>&1; then
            echo "Error: nix is not installed."
            echo "Install it: curl --proto '=https' --tlsv1.2 -sSf -L https://install.determinate.systems/nix | sh -s -- install"
            exit 1
          fi

          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          echo "Importing nix closure..."
          nix copy --from "file://$SCRIPT_DIR" --all --no-check-sigs

          # Find and symlink the run script
          VM_RUN=$(find /nix/store -maxdepth 2 -name "run-claude-os-vm" -path "*/bin/*" 2>/dev/null | head -1)
          if [ -n "$VM_RUN" ]; then
            mkdir -p "$SCRIPT_DIR/bin"
            ln -sf "$VM_RUN" "$SCRIPT_DIR/bin/run-claude-os-vm"
            echo ""
            echo "Claude-OS VM installed!"
            echo "Run: $SCRIPT_DIR/bin/run-claude-os-vm"
            echo "SSH: ssh -p 2222 claude@localhost (password: claude-os)"
          else
            echo "Error: Could not find run script in nix store."
            exit 1
          fi
          INSTALL
          chmod +x /tmp/claude-os-export/install.sh

          # Also write the store path for direct nix users
          echo "${{ env.VM_PATH }}" > /tmp/claude-os-export/STORE_PATH

          # Tar it all up
          tar czf claude-os-vm-${{ matrix.arch }}.tar.gz -C /tmp claude-os-export/
          ls -lh claude-os-vm-${{ matrix.arch }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vm-${{ matrix.arch }}
          path: claude-os-vm-${{ matrix.arch }}.tar.gz
          retention-days: 1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-vms]
    steps:
      - uses: actions/checkout@v4

      - name: Download all VM artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Claude-OS ${{ github.ref_name }}

            AI-native, self-evolving operating system built on NixOS.

            ### Downloads

            | File | Description |
            |------|-------------|
            | `claude-os-vm-x86_64.tar.gz` | QEMU VM — nix closure (Intel/AMD) |
            | `claude-os-vm-aarch64.tar.gz` | QEMU VM — nix closure (ARM64 / Apple Silicon) |

            ### Install & Run

            **Requires [nix](https://install.determinate.systems/nix) on your system.**

            ```bash
            # Download and extract
            tar xzf claude-os-vm-aarch64.tar.gz
            cd claude-os-export

            # Import into nix store and create run script
            bash install.sh

            # Boot the VM
            ./bin/run-claude-os-vm

            # SSH in (from another terminal)
            ssh -p 2222 claude@localhost
            # Password: claude-os
            ```

            **Or build from source (no download needed):**
            ```bash
            git clone https://github.com/shivsoji/claude-os.git
            cd claude-os
            nix build .#vm
            ./result/bin/run-claude-os-vm
            ```

            ### What's in ${{ github.ref_name }}

            See [CHANGELOG](https://github.com/shivsoji/claude-os/compare/v0.2.0...${{ github.ref_name }}) for full diff.
          files: |
            artifacts/*
