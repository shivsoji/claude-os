name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-vms:
    name: Build VM (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            target: packages.x86_64-linux.vm
          - arch: aarch64
            runner: ubuntu-24.04-arm
            target: packages.aarch64-linux.vm
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main
        continue-on-error: true

      - name: Build ${{ matrix.arch }} VM
        run: nix build .#${{ matrix.target }} -L

      - name: Export nix closure
        run: |
          VM_PATH=$(nix build .#${{ matrix.target }} --print-out-paths --no-link)
          echo "VM store path: $VM_PATH"

          # Export full closure as a single binary stream
          nix-store --export $(nix-store -qR "$VM_PATH") > /tmp/claude-os-closure.nar

          # Create wrapper with install script
          mkdir -p /tmp/claude-os-pkg
          mv /tmp/claude-os-closure.nar /tmp/claude-os-pkg/closure.nar
          echo "$VM_PATH" > /tmp/claude-os-pkg/VM_STORE_PATH

          cat > /tmp/claude-os-pkg/install.sh << 'SCRIPT'
          #!/usr/bin/env bash
          set -e
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"

          if ! command -v nix-store >/dev/null 2>&1; then
            echo "Error: nix is not installed."
            echo "Install: curl --proto '=https' --tlsv1.2 -sSf -L https://install.determinate.systems/nix | sh -s -- install"
            exit 1
          fi

          echo "Importing Claude-OS VM into nix store..."
          sudo nix-store --import < "$SCRIPT_DIR/closure.nar"

          VM_PATH=$(cat "$SCRIPT_DIR/VM_STORE_PATH")
          RUN_SCRIPT="$VM_PATH/bin/run-claude-os-vm"

          if [ -x "$RUN_SCRIPT" ]; then
            mkdir -p "$SCRIPT_DIR/bin"
            ln -sf "$RUN_SCRIPT" "$SCRIPT_DIR/bin/run-claude-os-vm"
            echo ""
            echo "Claude-OS installed!"
            echo "Run:  $SCRIPT_DIR/bin/run-claude-os-vm"
            echo "SSH:  ssh -p 2222 claude@localhost  (password: claude-os)"
          else
            echo "Error: Run script not found at $RUN_SCRIPT"
            exit 1
          fi
          SCRIPT
          chmod +x /tmp/claude-os-pkg/install.sh

          # Compress
          tar czf claude-os-vm-${{ matrix.arch }}.tar.gz -C /tmp claude-os-pkg/
          ls -lh claude-os-vm-${{ matrix.arch }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vm-${{ matrix.arch }}
          path: claude-os-vm-${{ matrix.arch }}.tar.gz
          retention-days: 1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-vms]
    steps:
      - uses: actions/checkout@v4

      - name: Download all VM artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Claude-OS ${{ github.ref_name }}

            AI-native, self-evolving operating system built on NixOS.

            ### Downloads

            | File | Description |
            |------|-------------|
            | `claude-os-vm-x86_64.tar.gz` | QEMU VM — full nix closure (Intel/AMD) |
            | `claude-os-vm-aarch64.tar.gz` | QEMU VM — full nix closure (ARM64 / Apple Silicon) |

            ### Install & Run

            **Requires [nix](https://install.determinate.systems/nix) on the host.**

            ```bash
            tar xzf claude-os-vm-aarch64.tar.gz
            cd claude-os-pkg
            sudo bash install.sh
            ./bin/run-claude-os-vm
            # SSH: ssh -p 2222 claude@localhost (password: claude-os)
            ```

            **Or build from source:**
            ```bash
            nix build github:shivsoji/claude-os#vm
            ./result/bin/run-claude-os-vm
            ```
          files: |
            artifacts/*
