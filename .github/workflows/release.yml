name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-x86:
    name: Build x86_64 Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            extra-substituters = https://cuda-maintainers.cachix.org
            extra-trusted-public-keys = cuda-maintainers.cachix.org-1:0dq3bujKpuEPMCX6U4WylrUDZ9JyUG0VpVZa7CNfq5E=

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build x86_64 VM
        run: |
          nix build .#packages.x86_64-linux.vm -L
          cp -rL result claude-os-vm-x86_64
          tar czf claude-os-vm-x86_64.tar.gz claude-os-vm-x86_64/

      - name: Build x86_64 ISO
        run: |
          nix build .#packages.x86_64-linux.iso -L
          cp -L result/iso/*.iso claude-os-x86_64.iso

      - name: Upload x86_64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-x86_64
          path: |
            claude-os-vm-x86_64.tar.gz
            claude-os-x86_64.iso
          retention-days: 1

  build-arm:
    name: Build aarch64 Artifacts
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build aarch64 VM
        run: |
          nix build .#packages.aarch64-linux.vm -L
          cp -rL result claude-os-vm-aarch64
          tar czf claude-os-vm-aarch64.tar.gz claude-os-vm-aarch64/

      - name: Build aarch64 ISO
        run: |
          nix build .#packages.aarch64-linux.iso -L
          cp -L result/iso/*.iso claude-os-aarch64.iso

      - name: Upload aarch64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-aarch64
          path: |
            claude-os-vm-aarch64.tar.gz
            claude-os-aarch64.iso
          retention-days: 1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-x86, build-arm]
    steps:
      - uses: actions/checkout@v4

      - name: Download x86_64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-x86_64
          path: artifacts/

      - name: Download aarch64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-aarch64
          path: artifacts/

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Claude-OS ${{ github.ref_name }}

            AI-native operating system built on NixOS. Claude is your shell.

            ### Downloads

            | File | Description |
            |------|-------------|
            | `claude-os-vm-x86_64.tar.gz` | QEMU VM image (Intel/AMD, NVIDIA/CUDA) |
            | `claude-os-vm-aarch64.tar.gz` | QEMU VM image (ARM64, Apple Silicon via OrbStack) |
            | `claude-os-x86_64.iso` | Bootable ISO installer (Intel/AMD) |
            | `claude-os-aarch64.iso` | Bootable ISO installer (ARM64) |

            ### Quick Start

            **VM (recommended for first try):**
            ```bash
            tar xzf claude-os-vm-x86_64.tar.gz
            cd claude-os-vm-x86_64
            ./bin/run-claude-os-vm
            # SSH in from another terminal:
            ssh -p 2222 claude@localhost  # password: claude-os
            ```

            **ISO (bare metal / VM hypervisor):**
            ```bash
            # Write to USB
            sudo dd if=claude-os-x86_64.iso of=/dev/sdX bs=4M status=progress
            # Boot from USB, login as claude, run claude-os-install
            ```

            ### What's Included

            - Claude Code as login shell with full system access
            - Master agent daemon (orchestration, awareness, self-healing)
            - Evolution engine (genome-based self-mutation with rollback)
            - SQLite memory graph (FTS5 search, decay, context windows)
            - Ollama for local LLM inference (CUDA on x86_64)
            - Health guardian (auto-restart, disk cleanup, process management)
            - Multi-agent coordination (locking, conflict detection)

            See [README](https://github.com/shivsoji/claude-os#readme) for full documentation.
          files: |
            artifacts/*
