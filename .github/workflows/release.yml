name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-vms:
    name: Build VM (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            target: packages.x86_64-linux.vm
          - arch: aarch64
            runner: ubuntu-24.04-arm
            target: packages.aarch64-linux.vm
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main
        continue-on-error: true

      - name: Build ${{ matrix.arch }} VM
        run: |
          nix build .#${{ matrix.target }} -L
          VM_PATH=$(nix build .#${{ matrix.target }} --print-out-paths --no-link)
          # Archive just the bin/ directory (the run script)
          tar czf claude-os-vm-${{ matrix.arch }}.tar.gz -C "$VM_PATH" bin/
          ls -lh claude-os-vm-${{ matrix.arch }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vm-${{ matrix.arch }}
          path: claude-os-vm-${{ matrix.arch }}.tar.gz
          retention-days: 1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-vms]
    steps:
      - uses: actions/checkout@v4

      - name: Download all VM artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Claude-OS ${{ github.ref_name }}

            AI-native, self-evolving operating system built on NixOS. Claude is your shell.

            ### Downloads

            | File | Description |
            |------|-------------|
            | `claude-os-vm-x86_64.tar.gz` | QEMU VM (Intel/AMD) |
            | `claude-os-vm-aarch64.tar.gz` | QEMU VM (ARM64 / Apple Silicon via OrbStack) |

            > **ISOs**: Build locally with `nix build .#packages.x86_64-linux.iso` (takes ~30 min)

            ### Quick Start

            ```bash
            tar xzf claude-os-vm-aarch64.tar.gz
            ./bin/run-claude-os-vm
            # In another terminal:
            ssh -p 2222 claude@localhost
            # Password: claude-os
            ```

            ### What's Inside

            - **Claude Code** as login shell with full system access
            - **Master agent** — always-on orchestration daemon
            - **Evolution engine** — genome-based self-mutation with rollback
            - **Memory graph** — SQLite + FTS5 with decay and context windows
            - **Awareness** — live system sensing, self-healing, agent coordination
            - **Ollama** — local LLM inference on port 11434
            - **50+ CLI tools** — `claude-os-evolve`, `claude-os-cap`, `claude-os-plan`, `claude-os-memory`, `claude-os-sense`, `claude-os-agents`, `claude-os-health`

            See [README](https://github.com/shivsoji/claude-os#readme) for full documentation.
          files: |
            artifacts/*
