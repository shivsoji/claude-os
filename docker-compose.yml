services:
  # ============================================
  # Claude-OS Platform
  # ============================================
  claude-os:
    build: .
    container_name: claude-os
    hostname: claude-os
    ports:
      - "2222:22"
      - "8420:8420"
    volumes:
      - claude-os-state:/var/lib/claude-os
    environment:
      CLAUDE_OS_STATE: /var/lib/claude-os
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_URL: http://ollama:11434
      SUPABASE_DB_URL: postgresql://postgres:${POSTGRES_PASSWORD:-claudeos}@postgres:5432/postgres
      SUPABASE_URL: http://postgres-rest:3000
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-service-key}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-claude-os-graph}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped
    networks:
      - claude-os-net

  # ============================================
  # PostgreSQL
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: claude-os-postgres
    ports:
      - "54322:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./supabase/migrations/00000000000000_init.sql:/docker-entrypoint-initdb.d/01_schema.sql
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-claudeos}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - claude-os-net

  # ============================================
  # PostgREST — Auto-generated REST API from Postgres
  # ============================================
  postgres-rest:
    image: postgrest/postgrest:v12.2.8
    container_name: claude-os-postgrest
    ports:
      - "3000:3000"
    environment:
      PGRST_DB_URI: postgresql://postgres:${POSTGRES_PASSWORD:-claudeos}@postgres:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: postgres
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - claude-os-net

  # ============================================
  # Supabase Realtime — WebSocket subscriptions
  # ============================================
  supabase-realtime:
    image: supabase/realtime:v2.34.47
    container_name: claude-os-realtime
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-claudeos}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq}
      ERL_AFLAGS: "-proto_dist inet_tcp"
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
      SEED_SELF_HOST: "true"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - claude-os-net

  # ============================================
  # Neo4j — Graph Memory
  # ============================================
  neo4j:
    image: neo4j:5-community
    container_name: claude-os-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-claude-os-graph}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - claude-os-net

  # ============================================
  # Ollama — Local LLM
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: claude-os-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    networks:
      - claude-os-net

volumes:
  claude-os-state:
  postgres-data:
  neo4j-data:
  neo4j-logs:
  ollama-models:

networks:
  claude-os-net:
    driver: bridge
